# Window rules

# Suppress maximize requests
windowrule = suppress_event maximize, match:class .*

# Subtle transparency on all windows (active/inactive)
windowrule = opacity 0.97 0.93, match:class .*

# Fix XWayland drag issues
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Float common dialogs
windowrule = float, match:class ^(pavucontrol|nm-connection-editor|blueman-manager|org.kde.polkit-kde-authentication-agent-1)$
windowrule = float, match:class ^(org.gnome.Calculator|gnome-calculator)$
windowrule = center, match:class ^(pavucontrol|nm-connection-editor)$
windowrule = size 700 500, match:class ^pavucontrol$

# Dolphin properties dialogs
windowrule = float, match:class ^org.kde.dolphin$, match:title ^(Properties|Rename)
