# Hyprlock — colours from hyprlock-theme.conf (generated by set-theme)
source = ~/.config/hypr/hyprlock-theme.conf

general {
    ignore_empty_input = true
}

background {
    monitor     =
    path        = /usr/share/wallpapers/Next/contents/images_dark/5120x2880.png
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.7
}

animations {
    enabled = false
}

# Clock
label {
    monitor   =
    text      = cmd[update:1000] echo "$(date '+%H:%M')"
    color     = rgba(205, 214, 244, 0.9)
    font_size = 80
    font_family = JetBrains Mono
    position  = 0, 160
    halign    = center
    valign    = center
}

# Date
label {
    monitor   =
    text      = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    color     = rgba(205, 214, 244, 0.7)
    font_size = 20
    font_family = JetBrains Mono
    position  = 0, 80
    halign    = center
    valign    = center
}

# Password input
input-field {
    monitor  =
    size     = 400, 55
    position = 0, -60
    halign   = center
    valign   = center

    inner_color       = $inner_color
    outer_color       = $outer_color
    outline_thickness = 3

    font_family   = JetBrains Mono
    font_color    = $font_color

    placeholder_text = Enter Password
    check_color      = $check_color
    fail_color       = $fail_color
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>

    rounding      = 8
    shadow_passes = 2
    shadow_size   = 4
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
