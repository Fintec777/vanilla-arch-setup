general {
    lock_cmd         = hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = sleep 1 && hyprctl dispatch dpms on
    inhibit_sleep    = 3
}

# Lock screen after 5 minutes of idle
listener {
    timeout  = 300
    on-timeout = loginctl lock-session
}

# Turn off display 1 minute after lock
listener {
    timeout  = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on && brightnessctl -r
}

# Keyboard backlight off after 5 minutes
listener {
    timeout    = 300
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0 2>/dev/null || true
    on-resume  = brightnessctl -rd '*::kbd_backlight' 2>/dev/null || true
}
