# Hyprlock — Catppuccin Mocha theme

general {
    ignore_empty_input = true
}

background {
    monitor     =
    path        = /usr/share/wallpapers/Next/contents/images_dark/5120x2880.png
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.7
}

animations {
    enabled = false
}

# Clock
label {
    monitor   =
    text      = cmd[update:1000] echo "$(date '+%H:%M')"
    color     = rgba(205, 214, 244, 0.9)
    font_size = 80
    font_family = JetBrains Mono
    position  = 0, 160
    halign    = center
    valign    = center
}

# Date
label {
    monitor   =
    text      = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    color     = rgba(205, 214, 244, 0.7)
    font_size = 20
    font_family = JetBrains Mono
    position  = 0, 80
    halign    = center
    valign    = center
}

# Password input
input-field {
    monitor  =
    size     = 400, 55
    position = 0, -60
    halign   = center
    valign   = center

    inner_color       = rgba(49, 50, 68, 0.9)
    outer_color       = rgba(137, 180, 250, 0.8)
    outline_thickness = 3

    font_family   = JetBrains Mono
    font_color    = rgba(205, 214, 244, 1.0)

    placeholder_text = Enter Password
    check_color      = rgba(166, 227, 161, 1.0)
    fail_color       = rgba(243, 139, 168, 1.0)
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>

    rounding      = 8
    shadow_passes = 2
    shadow_size   = 4
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
