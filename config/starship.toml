"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

format = """
$username\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[username]
show_always    = false
style_user     = "bold blue"
style_root     = "bold red"
format         = "[$user]($style) "

[directory]
truncation_length    = 3
truncate_to_repo     = true
style                = "bold blue"
read_only            = " 󰌾"
format               = "[$path]($style)[$read_only](red) "

[git_branch]
symbol  = " "
style   = "bold purple"
format  = "[$symbol$branch]($style) "

[git_status]
format    = "([\\[$all_status$ahead_behind\\]]($style) )"
style     = "bold yellow"
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
stashed    = "$"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

[cmd_duration]
min_time    = 2000
format      = "[took $duration](yellow) "
show_milliseconds = false

[python]
symbol   = " "
format   = "[$symbol$version]($style) "
style    = "bold yellow"

[nodejs]
symbol   = " "
format   = "[$symbol$version]($style) "
style    = "bold green"

[rust]
symbol   = " "
format   = "[$symbol$version]($style) "
style    = "bold red"

[package]
disabled = true
