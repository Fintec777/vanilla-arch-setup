# Input config

input {
    kb_layout  = us
    kb_options = compose:caps

    repeat_rate  = 40
    repeat_delay = 250

    numlock_by_default = true
    follow_mouse       = 1
    sensitivity        = 0

    touchpad {
        natural_scroll     = true
        clickfinger_behavior = true
        scroll_factor      = 0.4
        disable_while_typing = true
    }
}

# 3-finger horizontal swipe to switch workspaces (replaces removed workspace_swipe vars)
gesture = 3, horizontal, workspace

# Smooth scroll in terminals
windowrule = scroll_touchpad 1.5, match:class (kitty|Alacritty)
