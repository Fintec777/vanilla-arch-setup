# Monitor config — see: https://wiki.hypr.land/Configuring/Basics/Monitors/
# Run `hyprctl monitors` to list detected monitors.

# Auto-detect (works for most setups)
monitor = ,preferred,auto,auto

# Uncomment and adjust for your display:

# 1080p / 1440p (1x scale)
# env = GDK_SCALE,1
# monitor = ,preferred,auto,1

# 4K at 2x scale (crisp HiDPI)
# env = GDK_SCALE,2
# monitor = ,preferred,auto,2

# 4K at 1.5x (fractional, needs hyprland fractional scale support)
# env = GDK_SCALE,2
# monitor = ,preferred,auto,1.5

# Second monitor example:
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
