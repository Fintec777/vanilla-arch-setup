# Visual settings — colours loaded from theme.conf (generated by set-theme)
source = ~/.config/hypr/theme.conf

general {
    gaps_in  = 5
    gaps_out = 10

    border_size = 2
    col.active_border   = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding = 8

    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1e1e2eee)
    }

    blur {
        enabled    = true
        size       = 3
        passes     = 2
        special    = true
        brightness = 0.8
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,  0.23, 1,    0.32, 1
    bezier = almostLinear,  0.5,  0.5,  0.75, 1
    bezier = quick,         0.15, 0,    0.1,  1

    animation = global,          1, 10,  default
    animation = border,          1, 5,   easeOutQuint
    animation = windows,         1, 4,   easeOutQuint
    animation = windowsIn,       1, 4,   easeOutQuint, popin 87%
    animation = windowsOut,      1, 1.5, almostLinear, popin 87%
    animation = fade,            1, 3,   quick
    animation = workspaces,      1, 2.5, easeOutQuint, slidevert
    animation = specialWorkspace,1, 3,   easeOutQuint, slidevert
}

dwindle {
    pseudotile     = true
    preserve_split = true
    force_split    = 2
}

misc {
    disable_hyprland_logo     = true
    disable_splash_rendering  = true
    disable_scale_notification = true
    focus_on_activate         = true
    anr_missed_pings          = 3
}

cursor {
    hide_on_key_press         = true
    warp_on_change_workspace  = 1
}

binds {
    hide_special_on_workspace_change = true
}
