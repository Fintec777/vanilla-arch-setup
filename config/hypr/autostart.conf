# Autostart — processes launched when Hyprland starts

# Notifications
exec-once = dunst

# Status bar
exec-once = waybar

# Wallpaper (edit the path to your preferred image)
exec-once = swaybg -i /usr/share/wallpapers/Next/contents/images_dark/5120x2880.png -m fill

# Idle / lock daemon
exec-once = hypridle

# Polkit agent (needed for sudo GUI prompts)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Import Wayland env vars into systemd/dbus (fixes slow app launches)
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = dbus-update-activation-environment --systemd --all

# Network / bluetooth tray applets (uncomment if desired)
# exec-once = nm-applet --indicator
# exec-once = blueman-applet
